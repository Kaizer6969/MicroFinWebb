name: Build Active Tenant APKs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
    paths:
      - microfin_mobile/android/**
      - microfin_mobile/images/**
      - microfin_mobile/lib/**
      - microfin_mobile/pubspec.yaml
      - microfin_mobile/pubspec.lock
      - microfin_mobile/analysis_options.yaml
      - microfin_mobile/.metadata
      - .github/workflows/build-active-tenant-apks.yml

permissions:
  contents: write

concurrency:
  group: active-tenant-apks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-active-tenant-apks:
    runs-on: ubuntu-latest
    env:
      TENANT_API_URL: https://microfinwebb-production.up.railway.app/microfin_mobile/api/api_active_tenants.php

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: microfin_mobile
        run: flutter pub get

      - name: Build active tenant APKs
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import shutil
          import subprocess
          import urllib.request

          api_url = os.environ["TENANT_API_URL"]
          with urllib.request.urlopen(api_url, timeout=30) as response:
              payload = json.load(response)

          if payload.get("success") is not True:
              raise SystemExit("Tenant API did not return success=true.")

          tenants = []
          seen_slugs = set()
          for raw in payload.get("tenants", []):
              tenant_id = str(raw.get("tenant_id") or raw.get("id") or "").strip()
              slug_source = str(
                  raw.get("tenant_slug") or raw.get("tenant_id") or ""
              ).strip().lower()
              slug = re.sub(r"[^a-z0-9_-]+", "_", slug_source).strip("_")
              app_name = str(raw.get("tenant_name") or raw.get("appName") or slug).strip()
              tenant_lock_id = tenant_id or slug

              if not slug or slug in seen_slugs:
                  continue

              seen_slugs.add(slug)
              tenants.append({
                  "slug": slug,
                  "tenant_lock_id": tenant_lock_id,
                  "app_name": app_name or slug,
              })

          if not tenants:
              raise SystemExit("No active tenants were returned by the API.")

          output_dir = pathlib.Path("microfin_mobile/tenant_apks")
          output_dir.mkdir(parents=True, exist_ok=True)

          src_apk = pathlib.Path("microfin_mobile/build/app/outputs/flutter-apk/app-release.apk")

          for tenant in tenants:
              slug = tenant["slug"]
              tenant_lock_id = tenant["tenant_lock_id"]
              app_name = tenant["app_name"]
              print(f"Building tenant APK for {slug} ({app_name})")
              subprocess.run(
                  [
                      "flutter",
                      "build",
                      "apk",
                      "--release",
                      "--no-tree-shake-icons",
                      f"--dart-define=APP_NAME={app_name}",
                      f"--dart-define=TENANT_ID={tenant_lock_id}",
                  ],
                  cwd="microfin_mobile",
                  check=True,
              )
              shutil.copy2(src_apk, output_dir / f"{slug}.apk")

          print("Built tenant APKs:")
          for tenant in tenants:
              print(f"- {tenant['slug']}.apk")
          PY

      - name: Upload tenant APK artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: active-tenant-apks
          path: microfin_mobile/tenant_apks
          if-no-files-found: error

      - name: Commit tenant APK updates
        run: |
          if [ -z "$(git status --porcelain -- microfin_mobile/tenant_apks)" ]; then
            echo "Tenant APKs are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A microfin_mobile/tenant_apks
          git commit -m "chore(apk): rebuild active tenant APKs"

          TARGET_REF="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            git fetch origin "${TARGET_REF}"
            git rebase "origin/${TARGET_REF}"
            if git push origin "HEAD:${TARGET_REF}"; then
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "Failed to push tenant APK bundle after multiple attempts."
          exit 1
