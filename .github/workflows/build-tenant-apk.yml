name: Build Tenant APK

on:
  workflow_dispatch:
    inputs:
      tenant_slug:
        description: Tenant slug to lock into the APK
        required: true
      tenant_id:
        description: Immutable tenant ID to lock into the APK
        required: false
      app_name:
        description: Android app label shown to users
        required: true

permissions:
  contents: write

concurrency:
  group: tenant-apk-${{ github.ref }}-${{ github.event.inputs.tenant_slug }}
  cancel-in-progress: true

jobs:
  build-tenant-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve build variables
        id: vars
        run: |
          TENANT_SLUG="${{ github.event.inputs.tenant_slug }}"
          TENANT_SLUG="$(printf '%s' "$TENANT_SLUG" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]/_/g' | sed 's/^_\\+//; s/_\\+$//')"
          if [ -z "$TENANT_SLUG" ]; then
            echo "Tenant slug cannot be empty after normalization."
            exit 1
          fi

          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -z "$APP_NAME" ]; then
            echo "App name is required."
            exit 1
          fi

          TENANT_LOCK_ID="${{ github.event.inputs.tenant_id }}"
          TENANT_LOCK_ID="$(printf '%s' "$TENANT_LOCK_ID" | sed 's/^ *//; s/ *$//')"
          if [ -z "$TENANT_LOCK_ID" ]; then
            TENANT_LOCK_ID="$TENANT_SLUG"
          fi

          echo "tenant_slug=$TENANT_SLUG" >> "$GITHUB_OUTPUT"
          echo "tenant_lock_id=$TENANT_LOCK_ID" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: microfin_mobile
        run: flutter pub get

      - name: Build tenant release APK
        working-directory: microfin_mobile
        env:
          APP_NAME: ${{ steps.vars.outputs.app_name }}
          TENANT_LOCK_ID: ${{ steps.vars.outputs.tenant_lock_id }}
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=APP_NAME="$APP_NAME" \
            --dart-define=TENANT_ID="$TENANT_LOCK_ID"

      - name: Store tenant APK
        env:
          TENANT_SLUG: ${{ steps.vars.outputs.tenant_slug }}
        run: |
          mkdir -p microfin_mobile/tenant_apks
          cp microfin_mobile/build/app/outputs/flutter-apk/app-release.apk "microfin_mobile/tenant_apks/${TENANT_SLUG}.apk"

      - name: Upload tenant APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenant-apk-${{ steps.vars.outputs.tenant_slug }}
          path: microfin_mobile/tenant_apks/${{ steps.vars.outputs.tenant_slug }}.apk
          if-no-files-found: error

      - name: Commit tenant APK
        env:
          TENANT_SLUG: ${{ steps.vars.outputs.tenant_slug }}
        run: |
          if [ -z "$(git status --porcelain -- "microfin_mobile/tenant_apks/${TENANT_SLUG}.apk")" ]; then
            echo "Tenant APK is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "microfin_mobile/tenant_apks/${TENANT_SLUG}.apk"
          git commit -m "chore(apk): build tenant APK for ${TENANT_SLUG}"

          TARGET_REF="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            git fetch origin "${TARGET_REF}"
            git rebase "origin/${TARGET_REF}"
            if git push origin "HEAD:${TARGET_REF}"; then
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "Failed to push tenant APK after multiple attempts."
          exit 1
