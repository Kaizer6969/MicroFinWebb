name: Build Generic APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Android app label shown to users
        required: false
        default: Bank App
  push:
    branches:
      - main
    paths:
      - microfin_mobile/android/**
      - microfin_mobile/images/**
      - microfin_mobile/lib/**
      - microfin_mobile/pubspec.yaml
      - microfin_mobile/pubspec.lock
      - microfin_mobile/analysis_options.yaml
      - microfin_mobile/.metadata
      - .github/workflows/build-generic-apk.yml

permissions:
  contents: write

concurrency:
  group: generic-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-generic-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve build variables
        id: vars
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -z "$APP_NAME" ]; then
            APP_NAME="Bank App"
          fi
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: microfin_mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: microfin_mobile
        env:
          APP_NAME: ${{ steps.vars.outputs.app_name }}
        run: |
          flutter build apk --release \
            --dart-define=APP_NAME="$APP_NAME"

      - name: Replace served APK
        run: |
          cp microfin_mobile/build/app/outputs/flutter-apk/app-release.apk microfin_mobile/microfin_app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: microfin_app-apk
          path: microfin_mobile/microfin_app.apk
          if-no-files-found: error

      - name: Commit updated APK
        run: |
          if git diff --quiet -- microfin_mobile/microfin_app.apk; then
            echo "microfin_app.apk is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add microfin_mobile/microfin_app.apk
          git commit -m "chore(apk): rebuild generic microfin_app.apk"
          git push
